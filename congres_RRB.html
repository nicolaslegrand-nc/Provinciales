// ═══ CALCUL SIÈGES ═══
function repartir(vd,n){
  var s={};Object.keys(vd).forEach(function(k){s[k]=0;});
  for(var i=0;i<n;i++){
    var best=null,bv=-1;
    Object.keys(vd).forEach(function(k){var v=vd[k]/(s[k]+1);if(v>bv){bv=v;best=k;}});
    if(best)s[best]++;
  }
  return s;
}
function calcCongres(prov){
  var seuil=INSCRITS[prov]*0.05,voix=VOIX_DATA[prov],elig={};
  Object.keys(voix).forEach(function(k){if(voix[k]>=seuil)elig[k]=voix[k];});
  return Object.keys(elig).length>0 ? repartir(elig,TOTAL_CONG[prov]) : {};
}

// ═══ INVERSION NOM ═══
function invNom(nom){
  var p=nom.trim().split(' ');if(p.length<=1)return nom;
  var ps=p.length;
  for(var i=p.length-1;i>=0;i--){
    var w=p[i],wc=w.replace(/[éèêëàùîâôûïÉÈÊËÀÙÎÂÔÛÏ]/g,'e').replace(/-/g,'').replace(/'/g,'');
    var up=wc===wc.toUpperCase()&&wc.length>1&&/^[A-Za-z]+$/.test(wc);
    var ab=wc.replace('.','').length<=3&&w[0]===w[0].toUpperCase();
    if(up||ab){ps=i+1;break;}else if(w[0]===w[0].toUpperCase()){ps=i;}else{ps=i+1;break;}
  }
  if(ps>=p.length)ps=p.length-1;if(ps===0)return nom;
  return p.slice(ps).join(' ')+' '+p.slice(0,ps).join(' ');
}

// ═══ DONNÉES DÉRIVÉES ═══
function getSiegesCongres(){
  var out={};
  ['sud','nord','iles'].forEach(function(prov){ out[prov]=calcCongres(prov); });
  return out;
}

function getElusParGroupe(siegesCong){
  // Retourne pour chaque groupe : {visible:[{nom,prov}], attente:[{nom,prov}], totalVisible, totalAttente}
  var result=[];
  GROUPES.forEach(function(g){
    var visibles=[], attente=[];
    g.membres.forEach(function(m){
      var prov=m[0], listeNom=m[1];
      var n=siegesCong[prov][listeNom]||0;
      var cands=(CANDS_CONG[g.nom]&&CANDS_CONG[g.nom][prov])||[];
      var isVisible=PROVINCES_VISIBLES[prov];
      for(var i=0;i<n;i++){
        var item={nom: cands[i]?invNom(cands[i]):('Élu '+(i+1)), prov:prov};
        if(isVisible) visibles.push(item); else attente.push(item);
      }
    });
    if(visibles.length+attente.length>0){
      result.push({groupe:g, visibles:visibles, attente:attente});
    }
  });
  return result;
}

// ═══ SVG ═══
var W=900,CX=450,CY=360,GREY='#cccccc';
function getSeats(tot){
  var rd=[{r:130,f:.30},{r:195,f:.34},{r:260,f:.36}];
  var rings=rd.map(function(r){return{r:r.r,n:Math.round(tot*r.f)};});
  rings[rings.length-1].n+=tot-rings.reduce(function(s,r){return s+r.n;},0);
  var seats=[];
  rings.forEach(function(ring){
    for(var i=0;i<ring.n;i++){
      var a=Math.PI-i*Math.PI/Math.max(ring.n-1,1);
      seats.push({x:Math.round((CX+ring.r*Math.cos(a))*10)/10,y:Math.round((CY-ring.r*Math.sin(a))*10)/10,a:a});
    }
  });
  seats.sort(function(a,b){return b.a-a.a;});return seats;
}

}

// ═══ INTERACTIONS ═══
function showElu(elu,groupe,col,seats){
  var ib=document.getElementById('ib_c'),it1=document.getElementById('it1_c'),it2=document.getElementById('it2_c');
  if(!ib)return;
  ib.setAttribute('opacity','0.92');ib.setAttribute('fill',col);
  it1.textContent=groupe;it1.setAttribute('opacity','1');
  it2.textContent=elu;it2.setAttribute('opacity','1');
  if(seats!==undefined && seats>0) updateMajoBarC(seats, col, groupe);
}
function hideElu(){
  var ib=document.getElementById('ib_c'),it1=document.getElementById('it1_c'),it2=document.getElementById('it2_c');
  if(!ib)return;
  ib.setAttribute('opacity','0');it1.setAttribute('opacity','0');it2.setAttribute('opacity','0');
  resetMajoBarC();
}
function updateMajoBarC(seats, col, groupe){
  var d=majoBarDataC; if(!d) return;
  var fill=document.getElementById('majo_fill_c');
  var txt=document.getElementById('majo_txt_c');
  var lbl=document.getElementById('majo_lbl_c');
  if(!fill) return;
  var w=Math.min(d.barW, d.barW*(seats/d.tot));
  fill.setAttribute('width', w);
  fill.setAttribute('fill', col);
  var nm = groupe.length>22?groupe.substring(0,22)+'…':groupe;
  lbl.textContent = nm;
  txt.textContent = seats+' / '+d.majo+' sièges requis';
  txt.setAttribute('fill', col);
}
function resetMajoBarC(){
  var d=majoBarDataC; if(!d) return;
  var fill=document.getElementById('majo_fill_c');
  var txt=document.getElementById('majo_txt_c');
  var lbl=document.getElementById('majo_lbl_c');
  if(!fill) return;
  fill.setAttribute('width', 0);
  fill.setAttribute('fill', '#e8a000');
  lbl.textContent = 'Majorité absolue';
  txt.textContent = d.majo+' sièges requis';
  txt.setAttribute('fill', '#e82020');
}
function toggleElus(uid){
  var el=document.getElementById('elus-'+uid),arr=document.getElementById('arr-'+uid);
  if(!el)return;var open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(arr)arr.classList.toggle('open',!open);
}
