// ═══ CALCUL SIÈGES ═══
function repartir(vd,n){
  var s={};Object.keys(vd).forEach(function(k){s[k]=0;});
  for(var i=0;i<n;i++){
    var best=null,bv=-1;
    Object.keys(vd).forEach(function(k){var v=vd[k]/(s[k]+1);if(v>bv){bv=v;best=k;}});
    if(best)s[best]++;
  }
  return s;
}
function calcAll(prov){
  var seuil=Math.ceil(INSCRITS[prov]*0.05),voix=VOIX_DATA[prov],elig={};
  Object.keys(voix).forEach(function(k){if(voix[k]>=seuil)elig[k]=voix[k];});
  var ok=Object.keys(elig).length>0;
  return{prov:ok?repartir(elig,TOTAL_PROV[prov]):{},cong:ok?repartir(elig,TOTAL_CONG[prov]):{}};
}

// ═══ INVERSION NOM ═══
function invNom(nom){
  var p=nom.trim().split(' ');if(p.length<=1)return nom;
  var ps=p.length;
  var deaccent=function(s){return s.replace(/[éèêë]/g,'e').replace(/[ÉÈÊË]/g,'E').replace(/[àâ]/g,'a').replace(/[ÀÂ]/g,'A').replace(/[îï]/g,'i').replace(/[ÎÏ]/g,'I').replace(/[ôû]/g,'o').replace(/[ÔÛ]/g,'O').replace(/ù/g,'u').replace(/Ù/g,'U').replace(/ü/g,'u').replace(/Ü/g,'U').replace(/ç/g,'c').replace(/Ç/g,'C').replace(/ñ/g,'n').replace(/Ñ/g,'N');};
  for(var i=p.length-1;i>=0;i--){
    var w=p[i],wc=deaccent(w).replace(/-/g,'').replace(/'/g,'');
    var up=wc.length>1&&/^[A-Za-z]+$/.test(wc)&&wc===wc.toUpperCase();
    var ab=wc.replace('.','').length<=3&&w[0]===w[0].toUpperCase();
    if(up||ab){ps=i+1;break;}else if(w[0]===w[0].toUpperCase()){ps=i;}else{ps=i+1;break;}
  }
  if(ps>=p.length)ps=p.length-1;if(ps===0)return nom;
  return p.slice(ps).join(' ')+' '+p.slice(0,ps).join(' ');

var W=900,CX=450,CY=360,GREY='#cccccc';
function getSeats(tot){
  var rd=tot<=14?[{r:175,f:.43},{r:250,f:.57}]:tot<=22?[{r:170,f:.41},{r:245,f:.59}]:[{r:130,f:.30},{r:195,f:.34},{r:260,f:.36}];
  var rings=rd.map(function(r){return{r:r.r,n:Math.round(tot*r.f)};});
  rings[rings.length-1].n+=tot-rings.reduce(function(s,r){return s+r.n;},0);
  var seats=[];
  rings.forEach(function(ring){
    for(var i=0;i<ring.n;i++){
      var a=Math.PI-i*Math.PI/Math.max(ring.n-1,1);
      seats.push({x:Math.round((CX+ring.r*Math.cos(a))*10)/10,y:Math.round((CY-ring.r*Math.sin(a))*10)/10,a:a});
    }
  });
  seats.sort(function(a,b){return b.a-a.a;});return seats;
}

var svgDataByProv={sud:[],nord:[],iles:[]};
var majoBarData={};
function attachSeatEvents(prov){
  var svgEl=document.getElementById('svg-'+prov);
  var activeSeat=null;
  svgEl.querySelectorAll('.rrb-seat').forEach(function(el){
    el.addEventListener('mouseenter',function(){
      if(activeSeat)return;
      var d=svgDataByProv[prov][parseInt(this.getAttribute('data-i'))];
      if(d)showElu(d.prov,d.elu,d.liste,d.col,d.seats,d.isCong);
    });
    el.addEventListener('mouseleave',function(){
      if(activeSeat)return;
      var d=svgDataByProv[prov][parseInt(this.getAttribute('data-i'))];
      if(d)hideElu(d.prov);
    });
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var d=svgDataByProv[prov][parseInt(this.getAttribute('data-i'))];
      if(!d)return;
      if(activeSeat===this){ activeSeat=null; hideElu(d.prov); }
      else { activeSeat=this; showElu(d.prov,d.elu,d.liste,d.col,d.seats,d.isCong); }
    });
  });
  // Tap en dehors d'un siège : referme le nom et réinitialise la barre
  svgEl.addEventListener('click',function(e){
    if(!(e.target.classList && e.target.classList.contains('rrb-seat'))){ activeSeat=null; hideElu(prov); }
  });
}
function renderSVG(prov){
  svgDataByProv[prov]=[];

  });
  while(sColors.length<tot){sColors.push(GREY);sElus.push('');sListes.push('');sIsCong.push(false);sSeatsCount.push(0);}

    if(elu){

  // Barre de majorité absolue (interactive au survol des listes)

  majoBarData[prov]={barX:barX,barW:barW,tot:tot,majo:majo};
  s+='<line x1="20" y1="'+(HH+44)+'" x2="'+(W-20)+'" y2="'+(HH+44)+'" stroke="#d0d8f0" stroke-width="1"/>';
  if(shown.length>0){shown.forEach(function(nom,idx){var c=idx%COLS,row=Math.floor(idx/COLS),fx=sx+c*CW,fy=HH+59+row*22,nm=nom.length>24?nom.substring(0,24)+'…':nom,col=COULEURS[prov][nom]||GREY,sv=sp[nom]||0;s+='<circle cx="'+(fx+7)+'" cy="'+(fy-4)+'" r="7" fill="'+col+'"/><text x="'+(fx+18)+'" y="'+fy+'" font-family="Arial,sans-serif" font-size="11" fill="#333">'+nm+' <tspan font-weight="900" fill="'+col+'">'+sv+'</tspan></text>';});}

function renderLegende(prov){
  var res=calcAll(prov),sp=res.prov,sc=res.cong,seuil=Math.ceil(INSCRITS[prov]*0.05);
  var av=ORDRE[prov].filter(function(n){return (sp[n]||0)>0;}).sort(function(a,b){return (sp[b]||0)-(sp[a]||0);});
  var sa=ORDRE[prov].filter(function(n){return (sp[n]||0)===0;});
  var all=av.concat(sa),h='';
  all.forEach(function(nom,idx){
    var sv=sp[nom]||0,nc=sc[nom]||0,v=VOIX_DATA[prov][nom]||0;
    var col=COULEURS[prov][nom]||'#999',head=TETES[prov][nom]||'',uid=prov+'_'+idx;
    var cands=CANDIDATS[prov][nom]||[],elus=cands.slice(0,sv).map(invNom);
    var tot=EXPRIMES[prov]>0?EXPRIMES[prov]:Object.values(VOIX_DATA[prov]).reduce(function(a,b){return a+b;},0);
    var ps=v>0&&tot>0?('<span class="rrb-lp">'+(v/tot*100).toFixed(1)+' %</span>'):'';
    var vs=v>0?('<span class="rrb-lv">'+v.toLocaleString('fr-FR')+' voix</span>'):'';
    var cur=elus.length>0?'cursor:pointer':'';
    var noelus=(sv===0&&v>0)?' rrb-lr-noelus':'';
    h+='<div class="rrb-lr rrb-lr-hover'+noelus+'" id="lr-'+uid+'" data-prov="'+prov+'" data-seats="'+sv+'" data-col="'+col+'" data-nom="'+nom.replace(/"/g,'&quot;')+'" style="border-left:4px solid '+col+'!important;'+cur+'"'+(elus.length>0?' onclick="toggleElus(\''+uid+'\' )"':'')+' >';
    h+='<span class="rrb-lc" style="background:'+col+'"></span>';
    var ph=(typeof PHOTOS_TL!=='undefined'&&PHOTOS_TL[prov]&&PHOTOS_TL[prov][nom])?PHOTOS_TL[prov][nom]:'';
    h+='<span class="rrb-medslot">';
    if(ph){ h+='<img class="rrb-med rrb-med-ph" src="'+ph+'" alt="" style="border-color:'+col+'">'; }
    else { var ini=(head||'').split(/[\s\-]+/).filter(Boolean).slice(0,2).map(function(w){return w.charAt(0);}).join('').toUpperCase(); h+='<span class="rrb-med rrb-med-ini rrb-med-ph" style="border-color:'+col+';background:'+col+'">'+ini+'</span>'; }
    h+='</span>';
    h+='<div class="rrb-li"><span class="rrb-ln">'+nom+(elus.length>0?' <span class="rrb-arrow" id="arr-'+uid+'">▶</span>':'')+'</span><span class="rrb-lh">'+head+'</span></div>';
    h+='<div class="rrb-ls">'+ps+vs+'</div>';
    var seatTxt=sv>0?sv:(v>0?'0':'—');
    h+='<span class="rrb-lseat" style="color:'+(sv>0?col:'#b4b4bb')+'">'+seatTxt+'</span></div>';
    if(elus.length>0){
      h+='<div class="rrb-elus" id="elus-'+uid+'" data-prov="'+prov+'" data-seats="'+sv+'" data-col="'+col+'" data-nom="'+nom.replace(/"/g,'&quot;')+'" style="display:none"><div class="rrb-elus-inner">';
      if(ph){ h+='<div class="rrb-elus-med"><img class="rrb-elus-medimg" src="'+ph+'" alt="" style="border-color:'+col+'"><span class="rrb-elus-medcap">'+head+'</span></div>'; }
      else { var iniB=(head||'').split(/[\s\-]+/).filter(Boolean).slice(0,2).map(function(w){return w.charAt(0);}).join('').toUpperCase(); h+='<div class="rrb-elus-med"><span class="rrb-elus-medimg rrb-elus-medini" style="border-color:'+col+';background:'+col+'">'+iniB+'</span><span class="rrb-elus-medcap">'+head+'</span></div>'; }
      h+='<div class="rrb-elus-names">';
      elus.forEach(function(e,i){var badge=i<nc?'<span class="rrb-congres-badge">★ Congrès</span>':'';h+='<span class="rrb-elu"><span class="rrb-elu-num" style="background:'+col+'">'+(i+1)+'</span>'+e+badge+'</span>';});
      h+='</div></div></div>';
    }
  });
  document.getElementById('lw-'+prov).innerHTML=h;
  document.getElementById('lw-'+prov).querySelectorAll('.rrb-lr-click').forEach(function(el){
    el.addEventListener('click',function(){toggleElus(this.getAttribute('data-uid'));});
  });
  document.getElementById('lw-'+prov).querySelectorAll('.rrb-lr-hover').forEach(function(el){
    el.addEventListener('mouseenter',function(){
      var seats=parseInt(this.getAttribute('data-seats'))||0;
      if(seats>0) updateMajoBar(this.getAttribute('data-prov'), seats, this.getAttribute('data-col'), this.getAttribute('data-nom'));
    });
    el.addEventListener('mouseleave',function(){
      resetMajoBar(this.getAttribute('data-prov'));
    });
  });
  document.getElementById('lw-'+prov).querySelectorAll('.rrb-elus').forEach(function(el){
    el.addEventListener('mouseenter',function(){
      var seats=parseInt(this.getAttribute('data-seats'))||0;
      if(seats>0) updateMajoBar(this.getAttribute('data-prov'), seats, this.getAttribute('data-col'), this.getAttribute('data-nom'));
    });
    el.addEventListener('mouseleave',function(){ resetMajoBar(this.getAttribute('data-prov')); });
  });
}

function render(prov){renderSVG(prov);renderLegende(prov);}

// ═══ INTERACTIONS ═══
function showElu(prov,elu,liste,col,seats,isCong){
  if(!elu)return;
  var ib=document.getElementById('ib_'+prov),it1=document.getElementById('it1_'+prov),it2=document.getElementById('it2_'+prov);
  var ibadge=document.getElementById('ibadge_'+prov),itbadge=document.getElementById('itbadge_'+prov);
  if(!ib)return;
  ib.setAttribute('opacity','0.92');ib.setAttribute('fill',col);
  it1.textContent=liste.length>50?liste.substring(0,50)+'…':liste;it1.setAttribute('opacity','1');
  it2.textContent=elu;it2.setAttribute('opacity','1');
  if(isCong){
    ibadge.setAttribute('opacity','1');itbadge.setAttribute('opacity','1');
  } else if(ibadge){
    ibadge.setAttribute('opacity','0');itbadge.setAttribute('opacity','0');
  }
  if(seats!==undefined) updateMajoBar(prov, seats, col, liste);
}
function hideElu(prov){
  var ib=document.getElementById('ib_'+prov),it1=document.getElementById('it1_'+prov),it2=document.getElementById('it2_'+prov);
  var ibadge=document.getElementById('ibadge_'+prov),itbadge=document.getElementById('itbadge_'+prov);
  if(!ib)return;
  ib.setAttribute('opacity','0');it1.setAttribute('opacity','0');it2.setAttribute('opacity','0');
  if(ibadge){ibadge.setAttribute('opacity','0');itbadge.setAttribute('opacity','0');}
  resetMajoBar(prov);
}
function updateMajoBar(prov, seats, col, liste){
  var d=majoBarData[prov]; if(!d) return;
  var fill=document.getElementById('majo_fill_'+prov);
  var txt=document.getElementById('majo_txt_'+prov);
  var lbl=document.getElementById('majo_lbl_'+prov);
  if(!fill) return;
  var w=Math.min(d.barW, d.barW*(seats/d.tot));
  fill.setAttribute('width', w);
  fill.setAttribute('fill', col);
  var nm = liste.length>26?liste.substring(0,26)+'…':liste;
  var nameEl=document.getElementById('majo_name_'+prov);
  if(nameEl){ nameEl.textContent = nm; nameEl.setAttribute('fill', col); }
  txt.textContent = seats+' / '+d.majo+' sièges requis';
  txt.setAttribute('fill', '#555');
  var cnt=document.getElementById('count_'+prov); if(cnt){ cnt.textContent=seats+' / '+d.tot; cnt.setAttribute('fill',col); }
}
function resetMajoBar(prov){
  var d=majoBarData[prov]; if(!d) return;
  var fill=document.getElementById('majo_fill_'+prov);
  var txt=document.getElementById('majo_txt_'+prov);
  var lbl=document.getElementById('majo_lbl_'+prov);
  if(!fill) return;
  fill.setAttribute('width', 0);
  fill.setAttribute('fill', '#1a4dbf');
  var nameEl=document.getElementById('majo_name_'+prov); if(nameEl) nameEl.textContent='';
  var cnt=document.getElementById('count_'+prov); if(cnt){ cnt.textContent=d.tot; cnt.setAttribute('fill','#111'); }
  lbl.textContent = 'Majorité absolue';
  txt.textContent = d.majo+' sièges requis';
  txt.setAttribute('fill', '#555');
}
function toggleElus(uid){
  var el=document.getElementById('elus-'+uid),arr=document.getElementById('arr-'+uid),row=document.getElementById('lr-'+uid);
  if(!el)return;var open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(arr)arr.classList.toggle('open',!open);
  if(row)row.classList.toggle('rrb-lr-open',!open);
}

function exporterImage(prov){
  var svgEl = document.getElementById('svg-'+prov);
  var svgData = new XMLSerializer().serializeToString(svgEl);
  var vb = svgEl.getAttribute('viewBox').split(' ').map(Number);
  var w = vb[2], h = vb[3];
  var scale = 2; // export en haute résolution
  var canvas = document.createElement('canvas');
  canvas.width = w*scale; canvas.height = h*scale;
  var ctx = canvas.getContext('2d');
  var img = new Image();
  var svgBlob = new Blob([svgData], {type:'image/svg+xml;charset=utf-8'});
  var url = URL.createObjectURL(svgBlob);
  img.onload = function(){
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(blob){
      var a = document.createElement('a');
      var dateStr = new Date().toISOString().slice(0,10);
      a.href = URL.createObjectURL(blob);
      a.download = 'hemicycle_'+prov+'_'+dateStr+'.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }, 'image/png');
  };
  img.onerror = function(){
    alert('Export impossible — réessaie après le chargement complet de la page.');
    URL.revokeObjectURL(url);
  };
  img.src = url;
}
