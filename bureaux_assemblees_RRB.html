<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Élection des exécutifs provinciaux — RRB</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;color:#1a2a4a;
  background:linear-gradient(160deg,#2f5290 0%,#5a86cf 50%,#2f5290 100%);padding:14px}
.wrap{max-width:940px;margin:0 auto}
.hdr{display:flex;align-items:center;gap:14px;background:#fff;border-radius:14px;
  padding:14px 18px;box-shadow:0 6px 22px rgba(0,0,0,.22);margin-bottom:14px}
.hdr .logo{height:44px;width:auto}
.hdr .txt{flex:1}
.hdr h1{margin:0;font-size:1.18rem;color:#1a2a4a;letter-spacing:.2px}
.hdr .sub{font-size:.86rem;color:#5a6b8c;margin-top:3px;font-weight:600}
.hdr .provlogo{height:44px;width:44px;object-fit:contain}
.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab{flex:1;min-width:120px;border:none;border-radius:11px;padding:12px 8px;cursor:pointer;
  font-size:.9rem;font-weight:800;background:#e9eef8;color:#33456b;transition:.15s;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.tab.active{background:#fff;color:#1a4dbf;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.panel{display:none}.panel.active{display:block}

/* Carte bureau (mise en avant, en tête) */
.card{background:#fff;border-radius:14px;padding:18px 18px 20px;box-shadow:0 6px 22px rgba(0,0,0,.22);margin-bottom:14px}
.bureau{border-top:3px solid #1a4dbf;box-shadow:0 8px 26px rgba(26,77,191,.20);position:relative}
.bu-logo{position:absolute;top:10px;right:14px;height:46px;opacity:.95}
.bu-export{position:absolute;top:10px;left:12px;font-size:.72rem;font-weight:800;color:#1a4dbf;background:#eef3fd;border:1px solid #cfe0fb;border-radius:8px;padding:5px 10px;cursor:pointer}
.bu-export:hover{background:#e2ecfb}
.bureau .b-head{padding-top:6px}
.bureau-pres .stat{margin-top:9px;font-size:.9rem;color:#33456b;font-weight:600}
.bureau-pres .stat b{color:#1a2a4a;font-weight:900}
.bureau .b-head{text-align:center;margin-bottom:16px}
.bureau .b-head .p{font-size:1.05rem;font-weight:900;color:#1a2a4a}
.bureau .b-head .s{font-size:.82rem;font-weight:700;color:#1a4dbf;letter-spacing:.4px;text-transform:uppercase;margin-top:2px}
.bureau .todo{text-align:center;color:#8ea0c2;font-weight:700;font-size:.95rem;padding:26px 0}
.bureau .todo b{color:#1a4dbf}
.bureau-pres{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:6px}
.bureau-pres .role{font-size:.74rem;font-weight:800;color:#1a4dbf;text-transform:uppercase;letter-spacing:.5px;margin:8px 0 2px}
.bureau-pres .nom{font-size:1.2rem;font-weight:900;color:#1a2a4a}
.bureau-pres .pill{margin-top:5px}
.pill{display:inline-block;font-size:.68rem;font-weight:800;color:#fff;border-radius:20px;padding:2px 10px}
.vps{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:20px;padding-top:16px;border-top:1px dashed #dbe3f2}
.vp{display:flex;flex-direction:column;align-items:center;text-align:center;width:132px}
.vp .role{font-size:.66rem;font-weight:800;color:#7183a4;text-transform:uppercase;letter-spacing:.4px;margin:6px 0 1px;line-height:1.15}
.vp .nom{font-size:.9rem;font-weight:800;color:#33456b}
.vp .pill{margin-top:5px;padding:2px 9px;font-size:.64rem}

/* Médaillons */
.med{border-radius:50%;overflow:hidden;border:4px solid #ccc;background:#eef2fa}
.med img{width:100%;height:100%;object-fit:cover;display:block}
.med.init{display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff}
.med.pres{width:118px;height:118px;border-width:5px}
.med.init.pres{font-size:2rem}
.med.vp{width:78px;height:78px}
.med.init.vp{font-size:1.4rem}

/* Hémicycle */
.hemi{background:#fff;border-radius:14px;padding:10px;box-shadow:0 6px 22px rgba(0,0,0,.22);margin-bottom:14px}
.hemi svg{width:100%;height:auto;display:block}

/* Liste des élus */
.elus{display:flex;flex-direction:column;gap:12px}
.elu-grp{border:1px solid #e6ecf7;border-left-width:5px;border-radius:11px;padding:13px 15px;background:#fbfcfe}
.elu-grp .top{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;margin-bottom:9px}
.elu-grp .nm{font-weight:800;font-size:.98rem;color:#1a2a4a}
.elu-grp .cnt{font-size:.74rem;font-weight:800;color:#fff;border-radius:20px;padding:2px 9px}
.elu-grp .tete{font-size:.74rem;color:#7183a4;font-weight:600}
.elu-grp .names{display:flex;flex-wrap:wrap;gap:6px 8px}
.elu-grp .n{font-size:.82rem;color:#33456b;background:#eef2fa;border-radius:6px;padding:3px 9px;
  display:inline-flex;align-items:center;gap:5px}
.elu-grp .n.b{background:#fff5da;box-shadow:inset 0 0 0 1.5px #f0c94a;font-weight:700;color:#7a5a00}
.elu-grp .n .star{font-size:.72rem}
.foot{text-align:center;color:#dbe6ff;font-size:.72rem;font-weight:600;margin-top:8px;padding:8px}
.foot b{color:#fff}
@media(max-width:560px){
  .hdr h1{font-size:1.02rem}.hdr .logo{height:38px}.hdr .provlogo{height:38px;width:38px}
  .card{padding:16px 14px}.med.pres{width:104px;height:104px}
  .tab{min-width:100px;font-size:.82rem;padding:10px 6px}
  .bureau-pres .nom{font-size:1.08rem}
}
</style>
</head>

/* ====== Helpers ====== */
function invNom(nom){
  var p=nom.trim().split(' ');if(p.length<=1)return nom;
  var ps=p.length;
  var deaccent=function(s){return s.replace(/[éèêë]/g,'e').replace(/[ÉÈÊË]/g,'E').replace(/[àâ]/g,'a').replace(/[ÀÂ]/g,'A').replace(/[îï]/g,'i').replace(/[ÎÏ]/g,'I').replace(/[ôû]/g,'o').replace(/[ÔÛ]/g,'O').replace(/ù/g,'u').replace(/Ù/g,'U').replace(/ü/g,'u').replace(/Ü/g,'U').replace(/ç/g,'c').replace(/Ç/g,'C').replace(/ñ/g,'n').replace(/Ñ/g,'N');};
  for(var i=p.length-1;i>=0;i--){
    var w=p[i],wc=deaccent(w).replace(/-/g,'').replace(/'/g,'');
    var up=wc.length>1&&/^[A-Za-z]+$/.test(wc)&&wc===wc.toUpperCase();
    var ab=wc.replace('.','').length<=3&&w[0]===w[0].toUpperCase();
    if(up||ab){ps=i+1;break;}else if(w[0]===w[0].toUpperCase()){ps=i;}else{ps=i+1;break;}
  }
  if(ps>=p.length)ps=p.length-1;if(ps===0)return nom;
  return p.slice(ps).join(' ')+' '+p.slice(0,ps).join(' ');
}
function norm(s){return (s||'').toString().toUpperCase().replace(/[ÉÈÊË]/g,'E').replace(/[ÀÂ]/g,'A').replace(/[ÎÏ]/g,'I').replace(/[ÔÛ]/g,'O').replace(/[ÙÜ]/g,'U').replace(/Ç/g,'C').replace(/Ñ/g,'N').replace(/[^A-Z]/g,'');}
function sameName(a,b){return norm(a)===norm(b);}
function roleLabel(kind,genre){
  var f=(genre==='F');
  return kind==='president' ? (f?'Présidente':'Président') : (f?'Vice-présidente':'Vice-président');
}
function initials(nom){
  var p=(nom||'').trim().split(/\s+/).filter(Boolean);
  if(!p.length)return '?';
  var a=p[0][0]||'', b=p.length>1?(p[p.length-1][0]||''):'';
  return (a+b).toUpperCase();
}
function isTete(prov,liste,nom){
  var t=(TETES[prov]||{})[liste];return t?sameName(t,nom):false;
}
function photoFor(prov,person){
  if(person.photo)return person.photo;
  if(isTete(prov,person.liste,person.nom)){
    var ph=(PHOTOS_TL[prov]||{})[person.liste];if(ph)return ph;
  }
  return null;
}
function medaillon(prov,person,cls){
  var col=(COULEURS[prov]||{})[person.liste]||GREY;
  var ph=photoFor(prov,person);
  if(ph)return '<div class="med '+cls+'" style="border-color:'+col+'"><img src="'+ph+'"></div>';
  return '<div class="med init '+cls+'" style="background:'+col+'">'+initials(person.nom)+'</div>';
}

/* Listes ayant des sièges, ordonnées indép.→centre→loyaliste (ORDRE pour départager) */
function seatedLists(prov){
  var s=SIEGES[prov]||{}, ord=ORDRE[prov]||[];
  var arr=Object.keys(s).filter(function(k){return (parseInt(s[k])||0)>0;});
  arr.sort(function(a,b){
    var ra=RANK[(ORIENT[prov]||{})[a]]!==undefined?RANK[ORIENT[prov][a]]:9;
    var rb=RANK[(ORIENT[prov]||{})[b]]!==undefined?RANK[ORIENT[prov][b]]:9;
    if(ra!==rb)return ra-rb;
    return ord.indexOf(a)-ord.indexOf(b);
  });
  return arr.map(function(k){
    var n=parseInt(s[k])||0;
    return {liste:k,sieges:n,col:(COULEURS[prov]||{})[k]||GREY,
            tete:(TETES[prov]||{})[k]||'',
            elus:(CANDIDATS[prov]||{})[k]?CANDIDATS[prov][k].slice(0,n).map(invNom):[]};
  });
}
function totalSieges(prov){return seatedLists(prov).reduce(function(a,g){return a+g.sieges;},0);}

/* ====== Hémicycle (billes brillantes, style 28 juin) ====== */
var W=900,CX=450,CY=360,HH=CY+75;
function getSeats(tot){
  var rd=tot<=14?[{r:175,f:.43},{r:250,f:.57}]:tot<=22?[{r:170,f:.41},{r:245,f:.59}]:[{r:130,f:.30},{r:195,f:.34},{r:260,f:.36}];
  var rings=rd.map(function(r){return{r:r.r,n:Math.round(tot*r.f)};});
  rings[rings.length-1].n+=tot-rings.reduce(function(s,r){return s+r.n;},0);
  var seats=[];
  rings.forEach(function(ring){
    for(var i=0;i<ring.n;i++){
      var a=Math.PI-i*Math.PI/Math.max(ring.n-1,1);
      seats.push({x:Math.round((CX+ring.r*Math.cos(a))*10)/10,y:Math.round((CY-ring.r*Math.sin(a))*10)/10,a:a});
    }
  });
  seats.sort(function(a,b){return b.a-a.a;});return seats;
}
function hemicycleSVG(prov){
  var groups=seatedLists(prov), tot=totalSieges(prov);
  var cols=[];
  groups.forEach(function(g){for(var i=0;i<g.sieges;i++)cols.push(g.col);});
  while(cols.length<tot)cols.push(GREY);
  var seats=getSeats(tot);
  var HSVG=HH+40;
  var s='';
  s+='<svg viewBox="0 80 '+W+' 320" xmlns="http://www.w3.org/2000/svg">';
  s+='<defs><linearGradient id="bg_'+prov+'" x1="0" y1="1" x2="0" y2="0">';
  s+='<stop offset="0%" stop-color="#0d2a7a" stop-opacity="0.10"/>';
  s+='<stop offset="60%" stop-color="#1a3a8f" stop-opacity="0.04"/>';
  s+='<stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></linearGradient></defs>';
  s+='<rect width="'+W+'" height="'+HSVG+'" fill="white"/>';
  s+='<rect width="'+W+'" height="'+HSVG+'" fill="url(#bg_'+prov+')"/>';
  seats.forEach(function(seat,i){
    var col=cols[i]||GREY,x=seat.x,y=seat.y,sid='rg_'+prov+'_'+i;
    s+='<defs><radialGradient id="'+sid+'" cx="32%" cy="28%" r="68%">';
    s+='<stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>';
    s+='<stop offset="45%" stop-color="'+col+'" stop-opacity="0"/>';
    s+='<stop offset="100%" stop-color="#000000" stop-opacity="0.35"/></radialGradient></defs>';
    s+='<circle cx="'+x+'" cy="'+(Math.round((y+2)*10)/10)+'" r="12.5" fill="#00000030"/>';
    s+='<circle cx="'+x+'" cy="'+y+'" r="12.5" fill="'+col+'" stroke="white" stroke-width="1.5"/>';
    s+='<circle cx="'+x+'" cy="'+y+'" r="12.5" fill="url(#'+sid+')"/>';
  });
  s+='<text x="'+CX+'" y="'+(CY-8)+'" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="66" font-weight="900" fill="#1a2a4a">'+tot+'</text>';
  s+='<text x="'+CX+'" y="'+(CY+22)+'" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="800" fill="#7183a4" letter-spacing="2">SIÈGES</text>';
  s+='</svg>';
  return s;
}

function bureauCard(prov){

  var h='<div class="card bureau">';

  if(b.vps&&b.vps.length){
    h+='<div class="vps">';
    b.vps.forEach(function(v){
      h+='<div class="vp">'+medaillon(prov,v,'vp');
      h+='<div class="role">'+roleLabel('vp',v.genre)+'</div>';
      h+='<div class="nom">'+v.nom+'</div>';
      h+='<div class="pill" style="background:'+((COULEURS[prov]||{})[v.liste]||GREY)+'">'+v.liste+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div>';
  return h;
}

/* ====== Export image réseaux (carte exécutif → PNG autonome, sans dépendance) ====== */
function buildBureauSVG(prov){
  var b=BUREAU[prov]||{president:null,vps:[]};
  var W=1080, PAD=64, cx=W/2;
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function tw(s,fs,bold){return (s||'').length*fs*(bold?0.6:0.55);}
  function T(x,y,s,fs,fill,o){o=o||{};return '<text x="'+x+'" y="'+y+'" font-family="Arial,Segoe UI,sans-serif" font-size="'+fs+'" fill="'+fill+'"'+(o.w?' font-weight="'+o.w+'"':'')+(o.a?' text-anchor="'+o.a+'"':'')+(o.ls?' letter-spacing="'+o.ls+'"':'')+'>'+esc(s)+'</text>';}
  function RR(x,y,w,h,r,fill){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="'+r+'" fill="'+fill+'"/>';}
  function MED(mx,my,r,col,url,ini,ifs){var s='';if(url){var id='m'+Math.floor(Math.random()*1e7);s+='<clipPath id="'+id+'"><circle cx="'+mx+'" cy="'+my+'" r="'+(r-6)+'"/></clipPath>';s+='<image href="'+url+'" x="'+(mx-(r-6))+'" y="'+(my-(r-6))+'" width="'+(2*(r-6))+'" height="'+(2*(r-6))+'" clip-path="url(#'+id+')" preserveAspectRatio="xMidYMid slice"/>';s+='<circle cx="'+mx+'" cy="'+my+'" r="'+(r-3)+'" fill="none" stroke="'+col+'" stroke-width="6"/>';}else{s+='<circle cx="'+mx+'" cy="'+my+'" r="'+(r-3)+'" fill="'+col+'"/>'+T(mx,my+ifs*0.36,ini,ifs,'#ffffff',{a:'middle',w:900});}return s;}
  function PILL(px,py,label,col,fs){var w=tw(label,fs,true)+40;return RR(px-w/2,py,w,fs+18,(fs+18)/2,col)+T(px,py+fs+4,label,fs,'#ffffff',{a:'middle',w:800});}
  var parts=[], y;
  parts.push('__BG__');
  parts.push(RR(0,0,W,6,3,'#1a4dbf'));
  parts.push('<image href="'+LOGO_RRB+'" x="'+PAD+'" y="40" width="262" height="86" preserveAspectRatio="xMinYMid meet"/>');
  y=182;
  parts.push(T(cx,y,'Province '+META[prov].nom,46,'#1a2a4a',{a:'middle',w:900})); y+=44;
  parts.push(T(cx,y,'EXÉCUTIF PROVINCIAL',26,'#1a4dbf',{a:'middle',w:800,ls:2})); y+=28;
  if(!b.president){
    y+=90; parts.push(T(cx,y,'À élire le vendredi 3 juillet 2026',34,'#8ea0c2',{a:'middle',w:800})); y+=70;
  } else {
    var p=b.president, pcol=(COULEURS[prov]||{})[p.liste]||GREY, pr=140;
    parts.push(MED(cx,y+pr,pr,pcol,photoFor(prov,p),initials(p.nom),64)); y+=2*pr+40;
    parts.push(T(cx,y,roleLabel('president',p.genre).toUpperCase(),30,'#1a4dbf',{a:'middle',w:800,ls:1})); y+=50;
    parts.push(T(cx,y,p.nom,54,'#1a2a4a',{a:'middle',w:900})); y+=34;
    parts.push(PILL(cx,y,p.liste,pcol,28));
    if(p.voix!=null&&p.voix!==''){ y+=46+34; parts.push(T(cx,y,(p.genre==='F'?'Élue':'Élu')+' avec '+p.voix+' voix'+((p.total!=null&&p.total!=='')?' sur '+p.total:''),32,'#33456b',{a:'middle',w:800})); y+=16; } else { y+=28+18+30; }
    if(b.vps&&b.vps.length){
      y+=40; parts.push('<line x1="'+(PAD+40)+'" y1="'+y+'" x2="'+(W-PAD-40)+'" y2="'+y+'" stroke="#dbe3f2" stroke-width="2" stroke-dasharray="6 6"/>'); y+=54;
      var n=b.vps.length, medv=100, blockW=Math.min(300,(W-2*PAD)/n), startX=cx-(n*blockW)/2+blockW/2, rowTop=y;
      b.vps.forEach(function(vp,i){
        var vx=startX+i*blockW, vc=(COULEURS[prov]||{})[vp.liste]||GREY;
        parts.push(MED(vx,rowTop+medv,medv,vc,photoFor(prov,vp),initials(vp.nom),40));
        var ly=rowTop+2*medv+34;
        parts.push(T(vx,ly,roleLabel('vp',vp.genre),24,'#7183a4',{a:'middle',w:800})); ly+=30;
        parts.push(T(vx,ly,vp.nom,26,'#33456b',{a:'middle',w:800})); ly+=34;
        parts.push(PILL(vx,ly,vp.liste,vc,20));
      });
      y=rowTop+2*medv+34+30+34+20+18+22;
    } else { y+=20; }
  }
  y+=30;
  parts.push(T(cx,y,'Radio Rythme Bleu · rrb.nc',26,'#8ea0c2',{a:'middle',w:700})); y+=48;
  var H=y, bg=RR(0,0,W,H,0,'#ffffff');
  return {svg:'<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">'+parts.join('').replace('__BG__',bg)+'</svg>', w:W, h:H};
}
function exportBureauImage(prov){
  var out=buildBureauSVG(prov), img=new Image(), scale=2;
  img.onload=function(){
    var c=document.createElement('canvas');c.width=out.w*scale;c.height=out.h*scale;
    var ctx=c.getContext('2d');ctx.setTransform(scale,0,0,scale,0,0);ctx.drawImage(img,0,0);
    try{
      c.toBlob(function(blob){
        if(!blob){alert('Export impossible sur ce navigateur.');return;}
        var a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download='RRB_executif_'+prov+'.png';document.body.appendChild(a);a.click();a.remove();
        setTimeout(function(){URL.revokeObjectURL(a.href);},3000);
      },'image/png');
    }catch(e){alert('Export impossible sur ce navigateur.');}
  };
  img.onerror=function(){alert('Export impossible sur ce navigateur.');};
  img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(out.svg);
}

/* ====== Rendu liste des élus (bureau surligné ★/☆) ====== */
function elusList(prov){
  var b=BUREAU[prov]||{president:null,vps:[]};
  var members=[]; // {nom, star}
  if(b.president)members.push({nom:b.president.nom,star:'★'});
  (b.vps||[]).forEach(function(v){members.push({nom:v.nom,star:'☆'});});
  function starFor(nom){var m=members.find(function(x){return sameName(x.nom,nom);});return m?m.star:null;}
  var h='<div class="card"><div class="elus">';
  seatedLists(prov).slice().sort(function(a,b){return b.sieges-a.sieges;}).forEach(function(g){
    h+='<div class="elu-grp" style="border-left-color:'+g.col+'">';
    h+='<div class="top"><span class="nm">'+g.liste+'</span>';
    h+='<span class="cnt" style="background:'+g.col+'">'+g.sieges+' siège'+(g.sieges>1?'s':'')+'</span>';
    if(g.tete)h+='<span class="tete">Tête de liste : '+g.tete+'</span>';
    h+='</div><div class="names">';
    g.elus.forEach(function(nom){
      var st=starFor(nom);
      h+='<span class="n'+(st?' b':'')+'">'+(st?'<span class="star">'+st+'</span>':'')+nom+'</span>';
    });
    h+='</div></div>';
  });
  h+='</div></div>';
  return h;
}

/* ====== Assemblage ====== */
function renderProv(prov){
  return '<div class="panel'+(prov==='sud'?' active':'')+'" id="panel-'+prov+'">'
    + bureauCard(prov)
    + '<div class="hemi">'+hemicycleSVG(prov)+'</div>'
    + elusList(prov)
    + '</div>';
}
function switchTab(prov){
  PROVS.forEach(function(p){
    document.getElementById('panel-'+p).classList.toggle('active',p===prov);
  });
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.prov===prov);});
  var pl=LOGO_PROV[prov];var el=document.getElementById('hdr-prov');
  if(pl){el.src=pl;el.style.display='';}else{el.style.display='none';}
  sendHeight();
}
function build(){
  document.getElementById('hdr-logo').src=LOGO_RRB;
  var tabs=PROVS.map(function(p){
    return '<button class="tab'+(p==='sud'?' active':'')+'" data-prov="'+p+'" onclick="switchTab(\''+p+'\')">'+META[p].emoji+' Province '+META[p].nom+'</button>';
  }).join('');
  document.getElementById('tabs').innerHTML=tabs;
  document.getElementById('panels').innerHTML=PROVS.map(renderProv).join('');
  switchTab('sud');
}

/* ====== Auto-hauteur iframe (front rrb.nc) ====== */
function sendHeight(){
  try{var h=document.documentElement.scrollHeight;parent.postMessage({type:'rrb-resize',height:h},'*');}catch(e){}
}
window.addEventListener('load',function(){build();sendHeight();setTimeout(sendHeight,300);});
window.addEventListener('resize',sendHeight);
if(window.ResizeObserver){new ResizeObserver(sendHeight).observe(document.body);}
</script>
