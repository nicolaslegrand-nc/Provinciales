<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;color:#1a2a4a;background:#eef2f8;padding:14px}
.wrap{max-width:900px;margin:0 auto}
.hdr{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 3px 12px rgba(0,0,0,.1);margin-bottom:14px}
.hdr img{height:40px}.hdr h1{margin:0;font-size:1.05rem}.hdr .s{font-size:.8rem;color:#6b7a99;font-weight:600}
.cfg{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 3px 12px rgba(0,0,0,.1);margin-bottom:14px;display:flex;flex-wrap:wrap;gap:12px}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:.72rem;font-weight:800;color:#5a6b8c;text-transform:uppercase;letter-spacing:.3px}
.fld input{padding:8px 10px;border:1px solid #cfd8e8;border-radius:8px;font-size:.86rem;min-width:150px}
.hint{font-size:.68rem;color:#8ea0c2}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;border:none;border-radius:10px;padding:11px 8px;cursor:pointer;font-weight:800;background:#dde5f2;color:#33456b}
.tab.active{background:#1a4dbf;color:#fff}
.pan{display:none;background:#fff;border-radius:12px;padding:16px;box-shadow:0 3px 12px rgba(0,0,0,.1);margin-bottom:14px}
.pan.active{display:block}
.blk{border:1px solid #e6ecf7;border-radius:11px;padding:14px;margin-bottom:14px;background:#fbfcfe}
.blk h3{margin:0 0 10px;font-size:.9rem;color:#1a4dbf;text-transform:uppercase;letter-spacing:.4px}
.row{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.row .grow{flex:1;min-width:200px;display:flex;flex-direction:column;gap:8px}
select{padding:9px 10px;border:1px solid #cfd8e8;border-radius:8px;font-size:.86rem;width:100%;background:#fff}
.gender{display:flex;gap:8px}
.gender label{flex:1;text-align:center;border:1.5px solid #cfd8e8;border-radius:8px;padding:7px;cursor:pointer;font-weight:700;font-size:.82rem;color:#5a6b8c}
.gender input{display:none}
.gender input:checked+span{color:#1a4dbf}
.gender label:has(input:checked){border-color:#1a4dbf;background:#eef3ff}
.file{font-size:.78rem}
.prev{width:104px;text-align:center;flex-shrink:0}
.med{width:96px;height:96px;border-radius:50%;overflow:hidden;border:4px solid #ccc;background:#eef2fa;margin:0 auto}
.med img{width:100%;height:100%;object-fit:cover;display:block}
.med.init{display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:1.5rem}
.prev .rl{font-size:.66rem;font-weight:800;color:#1a4dbf;text-transform:uppercase;margin-top:5px}
.vp-item{border-top:1px dashed #dbe3f2;padding-top:12px;margin-top:12px}
.btn{border:none;border-radius:9px;padding:9px 14px;font-weight:800;cursor:pointer;font-size:.85rem}
.btn-add{background:#e9eef8;color:#1a4dbf}
.btn-del{background:#fdeaea;color:#c0392b;padding:6px 10px;font-size:.78rem}
.btn-pub{background:#1a9e4a;color:#fff}
.btn-copy{background:#e9eef8;color:#33456b}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.out{width:100%;min-height:70px;font-family:monospace;font-size:.72rem;border:1px solid #cfd8e8;border-radius:8px;padding:8px;margin-top:10px;white-space:pre;overflow:auto}
.msg{margin-top:10px;font-size:.85rem;font-weight:700;padding:8px 10px;border-radius:8px;display:none}
.msg.ok{background:#e6f7ec;color:#1a7a3a;display:block}
.msg.err{background:#fdeaea;color:#c0392b;display:block}
.note{font-size:.72rem;color:#8ea0c2;margin-top:4px}
.voix{font-size:.8rem;color:#33456b;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px}
.voix .vx{width:64px;padding:5px 6px;border:1px solid #cfd8ea;border-radius:7px;font-size:.85rem;font-weight:700;text-align:center}
.prev .rlv{font-size:.62rem;font-weight:700;color:#33456b;margin-top:3px;line-height:1.2}
</style>
</head>

var GREY='#cccccc';var PROVS=['sud','nord','iles'];
var META={sud:{nom:'Sud',emoji:'🔵'},nord:{nom:'Nord',emoji:'🔴'},iles:{nom:'Îles Loyauté',emoji:'🟠'}};
var ORIENT={
  sud:{'Les Loyalistes - le Rassemblement':'loyaliste','Nous, Réunis !':'centre','Un espoir pour demain':'loyaliste','Pour une Calédonie française':'loyaliste','Unis pour le pays':'indep','France-Calédonie : une patrie':'loyaliste','Kanaky pour tous':'indep','Faire Pays':'indep','Souveraineté Kanaky NC':'indep','Une province pour tous':'loyaliste','Un autre monde est possible !':'loyaliste'},
  nord:{'UC-FLNKS':'indep','UNI':'indep','Alternative Nord pour un pays souverain':'indep','Faire Pays':'indep','Agissons ensemble pour le Nord':'loyaliste'},
  iles:{'UC-FLNKS Îles':'indep','PALIKA Îles':'indep','Nation Autochtone':'indep','Union pour construire dans le consensus':'indep',"S'engager et oeuvrer pour la prospérité":'indep','Baselaia':'indep','Un nouveau souffle':'loyaliste'}
};
var RANK={indep:0,centre:1,loyaliste:2};
/* Genres connus (têtes de liste) — pré-sélectionnent le bon accord, modifiable */
var GENRE={'Sonia BACKÈS':'F','Vanessa WACAPO':'F','Omayra NAISSELINE':'F'};

function invNom(nom){
  var p=nom.trim().split(' ');if(p.length<=1)return nom;var ps=p.length;
  var da=function(s){return s.replace(/[éèêë]/g,'e').replace(/[ÉÈÊË]/g,'E').replace(/[àâ]/g,'a').replace(/[ÀÂ]/g,'A').replace(/[îï]/g,'i').replace(/[ÎÏ]/g,'I').replace(/[ôû]/g,'o').replace(/[ÔÛ]/g,'O').replace(/ù/g,'u').replace(/Ù/g,'U').replace(/ü/g,'u').replace(/Ü/g,'U').replace(/ç/g,'c').replace(/Ç/g,'C').replace(/ñ/g,'n').replace(/Ñ/g,'N');};
  for(var i=p.length-1;i>=0;i--){var w=p[i],wc=da(w).replace(/-/g,'').replace(/'/g,'');
    var up=wc.length>1&&/^[A-Za-z]+$/.test(wc)&&wc===wc.toUpperCase();
    var ab=wc.replace('.','').length<=3&&w[0]===w[0].toUpperCase();
    if(up||ab){ps=i+1;break;}else if(w[0]===w[0].toUpperCase()){ps=i;}else{ps=i+1;break;}}
  if(ps>=p.length)ps=p.length-1;if(ps===0)return nom;
  return p.slice(ps).join(' ')+' '+p.slice(0,ps).join(' ');
}
function norm(s){return (s||'').toString().toUpperCase().replace(/[ÉÈÊË]/g,'E').replace(/[ÀÂ]/g,'A').replace(/[ÎÏ]/g,'I').replace(/[ÔÛ]/g,'O').replace(/[ÙÜ]/g,'U').replace(/Ç/g,'C').replace(/Ñ/g,'N').replace(/[^A-Z]/g,'');}
function initials(nom){var p=(nom||'').trim().split(/\s+/).filter(Boolean);if(!p.length)return '?';return ((p[0][0]||'')+(p.length>1?(p[p.length-1][0]||''):'')).toUpperCase();}
function isTete(prov,liste,nom){var t=(TETES[prov]||{})[liste];return t?norm(t)===norm(nom):false;}
function guessGenre(nom){return GENRE[nom]||'M';}

function seatedLists(prov){
  var s=SIEGES[prov]||{},ord=ORDRE[prov]||[];
  var arr=Object.keys(s).filter(function(k){return (parseInt(s[k])||0)>0;});
  arr.sort(function(a,b){var ra=RANK[(ORIENT[prov]||{})[a]],rb=RANK[(ORIENT[prov]||{})[b]];
    ra=ra===undefined?9:ra;rb=rb===undefined?9:rb;if(ra!==rb)return ra-rb;return ord.indexOf(a)-ord.indexOf(b);});
  return arr.map(function(k){var n=parseInt(s[k])||0;
    return {liste:k,sieges:n,col:(COULEURS[prov]||{})[k]||GREY,
      elus:(CANDIDATS[prov]||{})[k]?CANDIDATS[prov][k].slice(0,n).map(invNom):[]};});
}
/* value d'un <option> = liste + séparateur + nom */
var SEP='\u0001';
function personSelect(prov,current,onchg){
  var h='<select onchange="'+onchg+'"><option value="">— choisir —</option>';
  seatedLists(prov).forEach(function(g){
    h+='<optgroup label="'+g.liste+'">';
    g.elus.forEach(function(nom,idx){
      var v=g.liste+SEP+nom;var sel=(current===v)?' selected':'';
      var tag=idx===0?' (tête de liste)':'';
      h+='<option value="'+v.replace(/"/g,'&quot;')+'"'+sel+'>'+nom+tag+'</option>';
    });
    h+='</optgroup>';
  });
  h+='</select>';return h;
}
function parseVal(v){if(!v)return null;var i=v.indexOf(SEP);return {liste:v.slice(0,i),nom:v.slice(i+1)};}
function medHTML(prov,liste,nom,photo){
  var col=(COULEURS[prov]||{})[liste]||GREY;
  var ph=photo||(isTete(prov,liste,nom)?(PHOTOS_TL[prov]||{})[liste]:null);
  if(ph)return '<div class="med" style="border-color:'+col+'"><img src="'+ph+'"></div>';
  return '<div class="med init" style="background:'+col+'">'+(nom?initials(nom):'?')+'</div>';
}

/* ====== État ====== */
var ST={};PROVS.forEach(function(p){ST[p]={pres:{val:'',genre:'M',photo:null,voix:'',total:''},vps:[]};});

function render(){
  document.getElementById('pans').innerHTML=PROVS.map(panel).join('');
  refreshOut();
}
function panel(prov){
  var st=ST[prov];
  var h='<div class="pan'+(prov==='sud'?' active':'')+'" id="pan-'+prov+'">';
  // Président
  h+='<div class="blk"><h3>Président · Présidente</h3><div class="row">';
  h+='<div class="grow">'+personSelect(prov,st.pres.val,'onPres(\''+prov+'\',this.value)');
  h+=genderRadios(prov,'pres',st.pres.genre,'onPresGenre(\''+prov+'\',this.value)');
  h+='<div class="file"><label>Photo (optionnelle — auto si tête de liste) </label> <input type="file" accept="image/*" onchange="onPhoto(\''+prov+'\',\'pres\',null,this)"></div>';
  h+='<div class="voix"><span>Résultat du vote du 3 juillet — élu·e avec </span><input type="number" min="0" class="vx" value="'+(st.pres.voix||'')+'" oninput="onPresVoix(\''+prov+'\',this.value)" placeholder="N"> voix sur <input type="number" min="0" class="vx" value="'+(st.pres.total||'')+'" oninput="onPresTotal(\''+prov+'\',this.value)" placeholder="T"></div>';
  h+='</div>';
  var pv=parseVal(st.pres.val);
  h+='<div class="prev">'+medHTML(prov,pv?pv.liste:'',pv?pv.nom:'',st.pres.photo)
     +'<div class="rl">'+(st.pres.genre==='F'?'Présidente':'Président')+'</div>'
     +'<div class="rlv" id="voix-'+prov+'">'+voixPrevText(prov)+'</div></div>';
  h+='</div></div>';
  // VP
  h+='<div class="blk"><h3>Vice-présidents · Vice-présidentes</h3>';
  st.vps.forEach(function(vp,i){
    var vv=parseVal(vp.val);
    h+='<div class="vp-item"><div class="row"><div class="grow">'
      +personSelect(prov,vp.val,'onVp(\''+prov+'\','+i+',this.value)')
      +genderRadios(prov,'vp'+i,vp.genre,'onVpGenre(\''+prov+'\','+i+',this.value)')
      +'<div class="file"><label>Photo (optionnelle) </label> <input type="file" accept="image/*" onchange="onPhoto(\''+prov+'\',\'vp\','+i+',this)"> '
      +'<button class="btn btn-del" onclick="delVp(\''+prov+'\','+i+')">Retirer</button></div></div>'
      +'<div class="prev">'+medHTML(prov,vv?vv.liste:'',vv?vv.nom:'',vp.photo)
      +'<div class="rl">'+(vp.genre==='F'?'Vice-présidente':'Vice-président')+'</div></div>'
      +'</div></div>';
  });
  h+='<div class="actions"><button class="btn btn-add" onclick="addVp(\''+prov+'\')">+ Ajouter un vice-président</button></div>';
  h+='</div></div>';
  return h;
}
function genderRadios(prov,key,val,onchg){
  var id=prov+'_'+key;
  return '<div class="gender">'
    +'<label><input type="radio" name="'+id+'" value="M"'+(val==='M'?' checked':'')+' onchange="'+onchg+'"><span>Homme — Président·V-P</span></label>'
    +'<label><input type="radio" name="'+id+'" value="F"'+(val==='F'?' checked':'')+' onchange="'+onchg+'"><span>Femme — Présidente·V-Pte</span></label>'
    +'</div>';
}

/* ====== Handlers ====== */
function onPres(p,v){ST[p].pres.val=v;var pv=parseVal(v);if(pv){ST[p].pres.genre=guessGenre(pv.nom);ST[p].pres.photo=null;}render();}
function onPresGenre(p,g){ST[p].pres.genre=g;render();}
function onPresVoix(p,v){ST[p].pres.voix=(v||'').replace(/[^0-9]/g,'');updVoixPrev(p);refreshOut();}
function onPresTotal(p,v){ST[p].pres.total=(v||'').replace(/[^0-9]/g,'');updVoixPrev(p);refreshOut();}
function voixPrevText(p){var st=ST[p],pv=parseVal(st.pres.val);return (pv&&st.pres.voix)?((st.pres.genre==='F'?'Élue':'Élu')+' avec '+st.pres.voix+' voix'+(st.pres.total?' sur '+st.pres.total:'')):'';}
function updVoixPrev(p){var el=document.getElementById('voix-'+p);if(el)el.textContent=voixPrevText(p);}
function onVp(p,i,v){ST[p].vps[i].val=v;var vv=parseVal(v);if(vv){ST[p].vps[i].genre=guessGenre(vv.nom);ST[p].vps[i].photo=null;}render();}
function onVpGenre(p,i,g){ST[p].vps[i].genre=g;render();}
function addVp(p){ST[p].vps.push({val:'',genre:'M',photo:null});render();}
function delVp(p,i){ST[p].vps.splice(i,1);render();}
function onPhoto(p,kind,i,input){
  var f=input.files&&input.files[0];if(!f)return;
  cropSquare(f,function(dataUrl){
    if(kind==='pres')ST[p].pres.photo=dataUrl;else ST[p].vps[i].photo=dataUrl;
    render();
  });
}
/* Recadrage carré centré → PNG ~220px */
function cropSquare(file,cb){
  var img=new Image();img.onload=function(){
    var side=Math.min(img.width,img.height),sx=(img.width-side)/2,sy=(img.height-side)/2;
    var S=220,c=document.createElement('canvas');c.width=S;c.height=S;
    c.getContext('2d').drawImage(img,sx,sy,side,side,0,0,S,S);
    cb(c.toDataURL('image/png'));
  };img.src=URL.createObjectURL(file);
}

/* ====== Construction du bloc BUREAU ====== */
function buildBureau(){
  var out={};
  PROVS.forEach(function(p){
    var st=ST[p],pv=parseVal(st.pres.val);
    var pres=pv?{nom:pv.nom,liste:pv.liste,genre:st.pres.genre,photo:st.pres.photo||null}:null;
    if(pres){var _vx=parseInt(st.pres.voix,10),_tt=parseInt(st.pres.total,10);if(!isNaN(_vx))pres.voix=_vx;if(!isNaN(_tt))pres.total=_tt;}
    var vps=[];
    st.vps.forEach(function(vp){var vv=parseVal(vp.val);if(vv)vps.push({nom:vv.nom,liste:vv.liste,genre:vp.genre,photo:vp.photo||null});});
    out[p]={president:pres,vps:vps};
  });
  return out;
}
function bureauBlock(){
  return 'var BUREAU = '+JSON.stringify(buildBureau(),null,2)+';';
}
function refreshOut(){document.getElementById('out').value=bureauBlock();}

/* ====== Onglets ====== */
function switchTab(p){
  PROVS.forEach(function(x){document.getElementById('pan-'+x).classList.toggle('active',x===p);});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.p===p);});
}

/* ====== Token ====== */
function saveTok(){try{localStorage.setItem('rrb_bureau_tok',document.getElementById('cfg-token').value);}catch(e){}}
function loadTok(){try{var t=localStorage.getItem('rrb_bureau_tok');if(t)document.getElementById('cfg-token').value=t;}catch(e){}}

/* ====== Publication GitHub ====== */
function showMsg(txt,ok){var m=document.getElementById('msg');m.textContent=txt;m.className='msg '+(ok?'ok':'err');}
function b64encodeUtf8(str){return btoa(unescape(encodeURIComponent(str)));}
function b64decodeUtf8(b64){return decodeURIComponent(escape(atob(b64.replace(/\s/g,''))));}

async function publier(){
  var owner='nicolaslegrand-nc',repo='Provinciales';
  var path=document.getElementById('cfg-file').value.trim();
  var branch=document.getElementById('cfg-branch').value.trim()||'main';
  var token=document.getElementById('cfg-token').value.trim();
  if(!token){showMsg('Renseigne d\'abord ton token GitHub.',false);return;}
  var api='https://api.github.com/repos/'+owner+'/'+repo+'/contents/'+encodeURIComponent(path);
  showMsg('Récupération du fichier sur GitHub…',true);
  try{
    var g=await fetch(api+'?ref='+encodeURIComponent(branch),{headers:{Authorization:'token '+token,Accept:'application/vnd.github+json'}});
    if(!g.ok){showMsg('Lecture impossible ('+g.status+'). Vérifie fichier / branche / token.',false);return;}
    var meta=await g.json();var sha=meta.sha;
    var html=b64decodeUtf8(meta.content||'');
    if(html.length<5000){showMsg('Fichier distant trop court ('+html.length+' car) — publication annulée par sécurité.',false);return;}
    var re=/\/\* BUREAU_START \*\/[\s\S]*?\/\* BUREAU_END \*\//;
    if(!re.test(html)){showMsg('Repères /* BUREAU_START/END */ introuvables dans le fichier distant.',false);return;}
    var newHtml=html.replace(re,'/* BUREAU_START */\n'+bureauBlock()+'\n/* BUREAU_END */');
    if(newHtml.length<5000){showMsg('Contenu généré trop court — publication annulée.',false);return;}
    showMsg('Publication du commit…',true);
    var put=await fetch(api,{method:'PUT',headers:{Authorization:'token '+token,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'Exécutifs provinciaux — '+new Date().toLocaleString('fr-FR'),content:b64encodeUtf8(newHtml),sha:sha,branch:branch})});
    if(put.ok){showMsg('✓ Publié. L\'infographie se met à jour en 1–2 min (Ctrl+Shift+R pour forcer).',true);}
    else{var e=await put.json();showMsg('Échec du commit : '+(e.message||put.status),false);}
  }catch(err){showMsg('Erreur réseau : '+err.message,false);}
}
function copierBloc(){
  var t=document.getElementById('out');t.select();
  try{document.execCommand('copy');showMsg('Bloc BUREAU copié.',true);}catch(e){showMsg('Copie manuelle depuis la zone ci-dessus.',false);}
}

document.getElementById('logo').src=LOGO;
document.getElementById('tabs').innerHTML=PROVS.map(function(p){
  return '<button class="tab'+(p==='sud'?' active':'')+'" data-p="'+p+'" onclick="switchTab(\''+p+'\')">'+META[p].emoji+' '+META[p].nom+'</button>';
}).join('');
loadTok();render();
